#==========================
# ============================================================
# SERVER
# ============================================================
server.port=8080
server.servlet.context-path=/
spring.application.name=GigShield

# ============================================================
# DATASOURCE (PostgreSQL - LOCAL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/GigShield
spring.datasource.username=postgres
spring.datasource.password=Bunny@0718
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - Spring Boot Default)
spring.datasource.hikari.pool-name=GigShieldHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================================
# AES ENCRYPTION
# ============================================================
# 32 chars for key, 16 chars for IV
# Change these values before going to production
encryption.secret-key=MySecretKey12345MySecretKey12345
encryption.init-vector=InsuranceAppInit

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.example.Gig.Worker.Insurance=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# JACKSON (JSON)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================================
# ERROR HANDLING
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false