#==========================
# ============================================================
# SERVER
# ============================================================
spring.config.import=optional:classpath:application-secrets.properties
server.port=8080
server.servlet.context-path=/
spring.application.name=GigShield

# ============================================================
# DATASOURCE (PostgreSQL - LOCAL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/GigShield
spring.datasource.username=postgres
spring.datasource.password=Bunny@0718
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - Spring Boot Default)
spring.datasource.hikari.pool-name=GigShieldHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================================
# AES ENCRYPTION
# ============================================================
# 32 chars for key, 16 chars for IV
# Change these values before going to production
encryption.secret-key=MySecretKey12345MySecretKey12345
encryption.init-vector=InsuranceAppInit

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.example.Gig.Worker.Insurance=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# JACKSON (JSON)
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================================
# ERROR HANDLING
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

# ============================================================
# GMAIL SMTP — OTP EMAIL DELIVERY
# ============================================================
# STEP 1: Go to Google Account → Security → 2-Step Verification → App Passwords
# STEP 2: Generate a 16-char App Password (select "Mail" + "Windows Computer")
# STEP 3: Paste it below (no spaces) — DO NOT use your regular Gmail password!
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rachathanmaysrivardhan07@gmail.com
# ⚠️  Use a Gmail APP PASSWORD (16 chars), NOT your regular Gmail password!
# Go to: myaccount.google.com → Security → 2-Step Verification → App Passwords
# Select App: Mail, Device: Windows Computer → Generate → paste below (no spaces)
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# GOOGLE OAUTH2 (get from console.cloud.google.com)
# 1. Create project → Enable "Google People API"
# 2. OAuth consent screen → External
# 3. Credentials → Create OAuth2 Client ID → Web Application
# 4. Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}

# ============================================================
# TWILIO VERIFY V2 — AI VOICE OTP
# 1. Sign up at twilio.com (free trial gives $15 credit)
# 2. Go to Verify → Services → Create a new service
# 3. Set channel as "Call" and copy the Service SID
# ============================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
# ⬇️  Get this from: Twilio Console → Verify → Services → Your Service → Service SID (starts with VA)
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID}

# ============================================================
# FRONTEND URL (for OAuth redirect after Google login)
# ============================================================
frontend.url=http://localhost:5173